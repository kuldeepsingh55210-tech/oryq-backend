version: '3.8'

services:
  backend:
    image: python:3.12-slim
    container_name: oryq-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/backend
    working_dir: /backend
    env_file:
      - .env
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

